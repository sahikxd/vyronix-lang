name: VYRONIX CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
    - uses: actions/checkout@v4

    - name: Set up C++ (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential

    - name: Set up C++ (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        brew install make

    - name: Build (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        .\build.bat

    - name: Build (Linux/macOS)
      if: matrix.os != 'windows-latest'
      run: |
        make all

    - name: Run Tests (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        .\vyronixc.exe examples/hello.vx
        .\vyronixvm.exe out.vyb

    - name: Run Tests (Linux/macOS)
      if: matrix.os != 'windows-latest'
      run: |
        ./vyronixc examples/hello.vx
        ./vyronixvm out.vyb

    - name: Prepare Artifacts (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        mkdir dist
        copy vyronix.exe dist\
        copy vyronixc.exe dist\
        copy vyronixvm.exe dist\
        copy vyx.exe dist\
        copy vyronix-runtime.a dist\

    - name: Prepare Artifacts (Linux/macOS)
      if: matrix.os != 'windows-latest'
      run: |
        mkdir dist
        cp vyronix vyronixc vyronixvm vyx vyronix-runtime.a dist/

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: vyronix-${{ matrix.os }}
        path: dist/
