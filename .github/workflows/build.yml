name: VYRONIX CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
    - uses: actions/checkout@v4

    - name: Build (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        .\build.bat

    - name: Build (Linux/macOS)
      if: matrix.os != 'windows-latest'
      run: |
        make all

    - name: Run Tests (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        .\vyronixc.exe examples/hello.vx
        .\vyronixvm.exe out.vyb

    - name: Run Tests (Linux/macOS)
      if: matrix.os != 'windows-latest'
      run: |
        ./vyronixc examples/hello.vx
        ./vyronixvm out.vyb

    - name: Prepare Artifacts
      run: |
        mkdir -p dist
        if [ "${{ matrix.os }}" = "windows-latest" ]; then
          cp vyronix.exe vyronixc.exe vyronixvm.exe vyx.exe vyronix-runtime.a dist/ || true
        else
          cp vyronix vyronixc vyronixvm vyx vyronix-runtime.a dist/ || true
        fi
      shell: bash

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: vyronix-${{ matrix.os }}
        path: dist/
