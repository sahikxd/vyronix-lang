name: VYRONIX CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
    - uses: actions/checkout@v4

    - name: Set up C++ (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential

    - name: Set up C++ (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        brew install make gcc

    - name: Build (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        .\build.bat

    - name: Build (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        make all -j$(nproc)

    - name: Build (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        make all CXX=g++-14 -j$(sysctl -n hw.logicalcpu)

    - name: Run Tests (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        .\vyronixc.exe examples/hello.vx
        .\vyronixvm.exe out.vyb

    - name: Run Tests (Linux/macOS)
      if: matrix.os != 'windows-latest'
      run: |
        ./vyronixc examples/hello.vx
        ./vyronixvm out.vyb

    - name: Prepare Artifacts
      run: |
        mkdir -p dist
        if [ "${{ matrix.os }}" = "windows-latest" ]; then
          cp vyronix.exe vyronixc.exe vyronixvm.exe vyx.exe vyronix-runtime.a dist/ || true
        else
          cp vyronix vyronixc vyronixvm vyx vyronix-runtime.a dist/ || true
        fi
      shell: bash

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: vyronix-${{ matrix.os }}
        path: dist/
